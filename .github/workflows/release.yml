name: Release Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build VSIX
        run: pnpm run vsix

      - name: Resolve VSIX path
        id: vsix
        run: |
          path=$(ls dist-vsix/*.vsix | head -n 1)
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$path")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.path }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Upload VSIX artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vsix.outputs.name }}
          path: ${{ steps.vsix.outputs.path }}
